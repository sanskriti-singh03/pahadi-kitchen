{% extends "base.html" %}
{% block title %}Admin Login — Pahadi Kitchen{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="icon">⚙️</div>
      <h2>Admin Access</h2>
      <p>Pahadi Kitchen management panel</p>
    </div>
    <form method="post">
      <div class="form-group">
        <label>Admin Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:.5rem;">
        Access Panel
      </button>
    </form>
    <div class="form-switch" style="margin-top:1rem;">
      <a href="{{ url_for('index') }}">← Back to site</a>
    </div>
  </div>
</div>
{% endblock %}
